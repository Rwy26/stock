<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo - 일반 자동매매</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-shell" data-page="auto-basic">
      <aside class="sidebar glass">
        <h1 class="brand">APOLLO</h1>
        <p class="brand-sub">Jeminai UI for SongStock2</p>

        <nav class="menu-list">
          <a class="menu" data-route="dashboard" href="index.html">대시보드</a>
          <a class="menu" data-route="portfolio" href="portfolio.html">포트폴리오</a>
          <a class="menu" data-route="stock-search" href="stock-search.html">종목 탐색</a>
          <a class="menu" data-route="recommendations" href="recommendations.html">추천 종목</a>
          <a class="menu" data-route="watchlist" href="watchlist.html">관심 종목</a>
          <a class="menu" data-route="auto-basic" href="auto-basic.html">일반 자동매매</a>
          <a class="menu" data-route="auto-sa" href="auto-sa.html">SA 자동매매</a>
          <a class="menu" data-route="auto-plus" href="auto-plus.html">Plus 자동매매</a>
          <a class="menu" data-route="sv-agent" href="sv-agent.html">SV Agent</a>
          <a class="menu" data-route="admin" href="admin.html">관리자</a>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar glass">
          <div>
            <p class="top-label">Auto Trading</p>
            <h2>일반 자동매매</h2>
            <p class="subtle">추천 점수 기반 단순 매수/매도 자동화</p>
          </div>
          <div class="status-pill">운영시간 09:00~15:20</div>
        </header>

        <section class="two-col">
          <article class="panel glass reveal">
            <div class="panel-head">
              <h3>설정</h3>
            </div>
            <div class="settings-grid">
              <label>
                활성화 여부
                <select>
                  <option>Off</option>
                  <option>On</option>
                </select>
              </label>
              <label>
                총 예산
                <input placeholder="예: 10000000" />
              </label>
              <label>
                종목당 예산
                <input placeholder="예: 2000000" />
              </label>
              <label>
                최대 보유 종목 수
                <input type="number" value="5" />
              </label>
              <label>
                손절률(%)
                <input type="number" value="-5" />
              </label>
              <label>
                익절률(%)
                <input type="number" value="10" />
              </label>
            </div>
            <div class="divider"></div>
            <button class="btn" type="button">저장</button>
            <p class="hint" style="margin-top: 10px;">거래일 1분 주기로 실행, 주말/공휴일 자동 스킵</p>
          </article>

          <article class="panel glass reveal">
            <div class="panel-head">
              <h3>상태</h3>
            </div>
            <ul class="engine-list">
              <li><span>엔진</span><span class="chip off">OFF</span></li>
              <li><span>오늘 거래 건수</span><b>0</b></li>
              <li><span>예산 잔액</span><b>₩-</b></li>
              <li><span>마지막 실행</span><b>-</b></li>
            </ul>
            <div class="divider"></div>
            <div class="chart-placeholder">매매 로그/성과 요약 Placeholder</div>
          </article>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
