<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo - 프로필 설정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="auth-shell">
      <section class="auth-card glass reveal">
        <h1 class="auth-title">프로필 설정</h1>
        <p class="subtle">최초 로그인 후 1회 설정</p>
        <div class="divider"></div>

        <div class="settings-grid" style="grid-template-columns: 1fr;">
          <label>닉네임 <input placeholder="nickname" /></label>
        </div>

        <div class="divider"></div>
        <h3 style="font-size: 1rem;">KIS API 정보</h3>
        <p class="hint" style="margin-top: 6px;">KIS 웹 → MY → 고객서비스 → Open API → 서비스 신청</p>

        <div class="settings-grid" style="grid-template-columns: 1fr; margin-top: 10px;">
          <label>KIS 앱키(App Key) <input placeholder="app key" /></label>
          <label>KIS 앱 시크릿(App Secret) <input placeholder="app secret" /></label>
          <label>계좌번호(앞 8자리) <input placeholder="12345678" /></label>
          <label>거래 구분 <select><option>실계좌</option><option>모의투자</option></select></label>
        </div>

        <div class="auth-actions">
          <a class="btn" href="index.html" style="display:inline-grid; place-items:center; text-decoration:none;">저장</a>
          <a class="btn secondary" href="login.html" style="display:inline-grid; place-items:center; text-decoration:none;">뒤로</a>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
