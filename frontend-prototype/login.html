<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="auth-shell">
      <section class="auth-card glass reveal">
        <h1 class="auth-title">APOLLO</h1>
        <p class="subtle">Apollo Stock Trading System (SongStock2)</p>
        <div class="divider"></div>
        <div class="settings-grid" style="grid-template-columns: 1fr;">
          <label>이메일 주소 <input placeholder="email" /></label>
          <label>비밀번호 <input type="password" placeholder="password" /></label>
        </div>
        <div class="auth-actions">
          <a class="btn" href="index.html" style="display:inline-grid; place-items:center; text-decoration:none;">로그인</a>
          <a class="btn secondary" href="profile-setup.html" style="display:inline-grid; place-items:center; text-decoration:none;">최초 설정</a>
        </div>
        <p class="hint" style="margin-top: 12px;">기본 계정: administrator / !Sunset22</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
